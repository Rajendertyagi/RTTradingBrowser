name: Build RTTrading Browser
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build EXE
        run: |
          # The --name flag ensures the file is RTTrading.exe
          pyinstaller --noconsole --onefile --name "RTTrading" main.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: RTTrading-Windows-Build
          path: dist/RTTrading.exe
